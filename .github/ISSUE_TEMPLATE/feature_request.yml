name: Feature request
description: 提议一个聚焦且可验证的改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 这个功能要解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你期望的交互和结果。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 是否考虑过更简单的替代方式？
  - type: checkboxes
    id: scope
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues，未发现相同提议。
          required: true
        - label: 该提议不依赖未经授权的第三方媒体。
          required: true
