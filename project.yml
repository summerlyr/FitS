name: ExerciseFinder
options:
  bundleIdPrefix: com.summerli
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  ExerciseFinder:
    type: application
    platform: iOS
    sources:
      - path: ExerciseFinder
        excludes:
          - Resources
      - path: ExerciseFinder/Resources/data
        type: folder
        buildPhase: resources
      - path: ExerciseFinder/Resources/images
        type: folder
        buildPhase: resources
      - path: ExerciseFinder/Resources/videos
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.summerli.ExerciseFinder
        PRODUCT_NAME: ExerciseFinder
        DEVELOPMENT_TEAM: RJZZ47FLT6
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FitS
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
